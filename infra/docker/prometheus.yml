# H4wkQuant - Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'data_collector'
    static_configs:
      - targets: ['data_collector:9101']
    metrics_path: '/metrics'

  - job_name: 'spread_engine'
    static_configs:
      - targets: ['spread_engine:9102']
    metrics_path: '/metrics'

  - job_name: 'risk_manager'
    static_configs:
      - targets: ['risk_manager:9103']
    metrics_path: '/metrics'

  - job_name: 'executor'
    static_configs:
      - targets: ['executor:9104']
    metrics_path: '/metrics'

  - job_name: 'watchdog'
    static_configs:
      - targets: ['watchdog:9105']
    metrics_path: '/metrics'

  - job_name: 'panel'
    static_configs:
      - targets: ['panel:8180']
    metrics_path: '/api/v1/metrics'
